<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Wortarten-Klicktrainer · Campus Hannah Höch</title>
<style>
:root{--bg1:#dbeafe;--bg2:#f8fafc;--card:#fff;--text:#102033;--muted:#64748b;--accent:#2563eb;--accent2:#0f766e;--ok:#15803d;--bad:#b91c1c;--warn:#b45309;--border:#cbd5e1;--shadow:0 18px 55px rgba(15,23,42,.14);--track:#cbd5e1}
*,*:before,*:after{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{height:100%;margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;color:var(--text);background:linear-gradient(135deg,var(--bg1),var(--bg2));overflow:hidden}button,input{font-family:inherit}button{border:0;border-radius:16px;padding:12px 18px;font-size:16px;font-weight:800;cursor:pointer;background:var(--accent);color:#fff;box-shadow:0 8px 22px rgba(37,99,235,.22);white-space:nowrap;transition:transform .08s,box-shadow .08s}button:active{transform:translateY(1px);box-shadow:none}button.secondary{background:#e2e8f0;color:#0f172a;box-shadow:none}button.check{display:none;background:var(--accent2)}button.check.show,button.next.show{display:inline-flex;align-items:center;justify-content:center}button.next{display:none;background:#111827;box-shadow:none}
body.login-mode{display:flex;align-items:center;justify-content:center;min-height:100dvh;padding:18px;overflow:hidden}.login-wrap{display:flex;flex-direction:column;align-items:center;gap:18px;width:100%}.login-logo{width:min(240px,62vw);max-height:185px;object-fit:contain;filter:drop-shadow(0 6px 16px rgba(15,23,42,.12))}.login{width:min(620px,94vw);background:#fff;border:1px solid rgba(148,163,184,.45);border-radius:28px;padding:24px;box-shadow:var(--shadow);text-align:center}.login-school-label{font-size:12px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}.login h1{font-size:clamp(24px,5vw,36px);margin:0 0 8px}.login-sub{font-size:16px;color:var(--muted);margin:0 0 20px;line-height:1.45}.login-row{display:flex;gap:10px}input{flex:1;font-size:19px;padding:13px 15px;border:2px solid var(--border);border-radius:16px;outline:none;background:#f8fafc;color:var(--text);min-width:0}input:focus{border-color:var(--accent);background:#fff}.load-note{font-size:13px;color:#475569;margin-top:10px}.error{color:var(--bad);font-weight:800}
.app{display:none;width:100dvw;height:100dvh;align-items:stretch;justify-content:center;overflow:hidden}.stage{width:100dvw;height:100dvh;background:rgba(255,255,255,.94);display:grid;grid-template-rows:auto clamp(82px,13dvh,110px) auto minmax(0,1fr) auto;overflow:hidden}.top-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid #e2e8f0;background:#fff;gap:10px;min-height:58px}.top-bar-left{display:flex;align-items:center;gap:10px;min-width:0}.top-logo{width:clamp(86px,14vw,150px);height:48px;object-fit:contain;flex-shrink:0}.top-app-title{font-size:clamp(14px,2.2vw,20px);font-weight:950;line-height:1.05;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.top-app-sub{font-size:11px;color:var(--muted);font-weight:800;letter-spacing:.04em;text-transform:uppercase}.top-right{display:flex;align-items:center;gap:8px}.small-progress{font-size:12px;color:var(--muted);background:#f1f5f9;border:1px solid #e2e8f0;border-radius:999px;padding:6px 10px;white-space:nowrap;max-width:38vw;overflow:hidden;text-overflow:ellipsis}.menu-btn{display:none;width:44px;height:40px;border-radius:14px;background:#0f172a;color:#fff;font-size:23px;padding:0;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(15,23,42,.22)}body.running .menu-btn{display:flex}
.journey{position:relative;background:#f8fafc;border-bottom:1px solid #e2e8f0;overflow:hidden}.track-line{position:absolute;left:7%;right:5%;top:44px;height:8px;background:var(--track);border-radius:99px;box-shadow:inset 0 1px 2px rgba(0,0,0,.08)}.track-fill{position:absolute;left:7%;top:44px;height:8px;width:0;background:linear-gradient(90deg,#22c55e,#2563eb);border-radius:99px;transition:width .35s ease}.milestone{position:absolute;top:24px;transform:translateX(-50%);text-align:center;width:84px;font-size:10px;color:#334155;font-weight:900}.milestone .dot{display:block;width:20px;height:20px;border-radius:50%;background:#fff;border:4px solid #94a3b8;margin:5px auto 3px;box-shadow:0 2px 9px rgba(15,23,42,.12)}.milestone.done .dot{border-color:#16a34a;background:#dcfce7}.milestone.current .dot{border-color:#2563eb;background:#dbeafe;animation:pulse 1.4s infinite}@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.13)}}.stickman{position:absolute;top:12px;left:7%;width:34px;height:52px;transform:translateX(-50%);transition:left .35s ease;filter:drop-shadow(0 4px 5px rgba(15,23,42,.18))}.stickman svg{width:100%;height:100%;overflow:visible}.stickman line,.stickman circle{stroke:#111827;stroke-width:4;stroke-linecap:round;fill:#fff}.stickman .head{fill:#fef3c7}.journey-info{position:absolute;right:12px;top:7px;font-size:12px;color:#475569;font-weight:900}.badges-mini{position:absolute;left:10px;bottom:5px;font-size:17px;letter-spacing:1px}
.taskline{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 16px 5px}.prompt{font-size:clamp(18px,3.1vw,34px);font-weight:950;line-height:1.1;letter-spacing:-.02em}.task-type-pill{font-size:12px;background:#e0f2fe;color:#075985;border:1px solid #bae6fd;border-radius:999px;padding:6px 9px;font-weight:900;white-space:nowrap}.workarea{min-height:0;overflow:hidden;margin:0 12px 8px;border:2px dashed #dbeafe;border-radius:22px;background:#f8fafc;display:flex;align-items:stretch;justify-content:center;padding:10px}.workinner{width:100%;height:100%;min-height:0;overflow:auto;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px}.sentence{display:flex;flex-wrap:wrap;gap:8px 10px;justify-content:center;align-items:center;line-height:1.2;max-width:1160px}.word,.chip{font-size:clamp(19px,2.6vw,36px);font-weight:800;padding:8px 12px;border-radius:15px;background:transparent;border:2px solid transparent;box-shadow:none;color:#0f172a;cursor:pointer;user-select:none;transition:background .12s,border-color .12s,transform .08s}.word:hover,.chip:hover{transform:translateY(-1px);background:rgba(219,234,254,.4);border-color:rgba(37,99,235,.35)}.word.selected,.chip.selected{background:rgba(219,234,254,.65);border-color:#2563eb;color:#102a60;box-shadow:0 0 0 3px rgba(37,99,235,.11)}.word.correct,.chip.correct{background:rgba(220,252,231,.75);border-color:#16a34a;color:#14532d}.word.missed{background:rgba(254,243,199,.75);border-color:#f59e0b;color:#78350f}.word.wrong,.chip.wrong{background:rgba(254,226,226,.75);border-color:#ef4444;color:#7f1d1d}.word.answered{cursor:default}.punct{font-size:clamp(22px,2.9vw,38px);font-weight:850;padding:8px 0;color:#334155}.highlight{background:#fef3c7;border-radius:10px;padding:2px 6px;border:2px solid #f59e0b}.options{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}.gapline{font-size:clamp(22px,3vw,38px);font-weight:850;text-align:center;line-height:1.35}.blank{display:inline-flex;min-width:120px;min-height:48px;align-items:center;justify-content:center;border:3px dashed #94a3b8;border-radius:16px;background:#fff;margin:0 5px;padding:4px 12px;color:#64748b}.blank.filled{border-color:#2563eb;background:#dbeafe;color:#0f172a}.blank.correct{border-color:#16a34a;background:rgba(220,252,231,.75);color:#14532d}.blank.wrong{border-color:#ef4444;background:rgba(254,226,226,.75);color:#7f1d1d}.sort-layout{display:grid;grid-template-columns:1fr 1.2fr;gap:16px;width:100%;min-height:0}.sort-source,.sort-boxes{min-height:0;overflow:auto}.sort-source{display:flex;align-content:flex-start;gap:10px;flex-wrap:wrap;background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:12px}.sort-boxes{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}.dropbox{background:#fff;border:2px dashed #94a3b8;border-radius:16px;padding:10px;min-height:118px}.dropbox h3{margin:0 0 8px;font-size:17px}.dropbox .dropcontent{display:flex;flex-wrap:wrap;gap:8px}.dropbox.active{border-color:#2563eb;background:#eff6ff}.mc-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:min(1050px,100%)}.choice-card{background:#fff;border:2px solid #e2e8f0;color:#0f172a;box-shadow:none;text-align:left;white-space:normal;font-size:clamp(15px,2.2vw,22px);line-height:1.25}.choice-card.selected{border-color:#2563eb;background:#dbeafe}.choice-card.correct{border-color:#16a34a;background:#dcfce7}.choice-card.wrong{border-color:#ef4444;background:#fee2e2}.prod-box{width:min(780px,95%);background:#fff;border:1px solid #e2e8f0;border-radius:20px;padding:18px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:center}.prod-box input{max-width:380px}.why-card{display:none;position:absolute;right:16px;bottom:78px;width:min(470px,88vw);background:#fff;border:2px solid #bfdbfe;border-radius:20px;padding:12px;box-shadow:0 18px 50px rgba(15,23,42,.2);z-index:20}.why-card.show{display:block}.why-card h3{margin:0 0 8px;font-size:17px}.why-options{display:flex;flex-direction:column;gap:7px}.why-options button{white-space:normal;text-align:left;background:#eff6ff;color:#0f172a;box-shadow:none;padding:10px;font-size:14px}.why-options button.ok{background:#dcfce7;color:#14532d}.why-options button.no{background:#fee2e2;color:#7f1d1d}
.bottom{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 12px 10px;border-top:1px solid #e2e8f0;background:#fff;min-height:58px}.feedback{font-size:clamp(13px,1.8vw,17px);font-weight:800;line-height:1.25;color:var(--muted);min-width:0}.feedback.ok{color:var(--ok)}.feedback.bad{color:var(--bad)}.feedback.warn{color:var(--warn)}.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.drawer-backdrop{display:none;position:fixed;inset:0;background:rgba(15,23,42,.35);z-index:8998}.drawer-backdrop.open{display:block}.drawer{position:fixed;left:0;top:0;bottom:0;width:min(450px,92vw);background:#fff;z-index:8999;transform:translateX(-105%);transition:transform .25s ease;box-shadow:24px 0 60px rgba(15,23,42,.25);border-right:1px solid #e2e8f0;display:flex;flex-direction:column}.drawer.open{transform:translateX(0)}.drawer-head{display:flex;align-items:center;gap:12px;padding:12px;border-bottom:1px solid #e2e8f0;background:#f8fafc;flex-shrink:0}.drawer-head img{width:92px;height:42px;object-fit:contain}.drawer-head h2{margin:0;font-size:22px;flex:1}.drawer-close{background:#e2e8f0;color:#0f172a;border-radius:12px;box-shadow:none;padding:8px 12px;font-size:18px}.drawer-tabs{display:flex;gap:6px;overflow:auto;padding:9px;background:#f8fafc;border-bottom:1px solid #e2e8f0;flex-shrink:0}.drawer-tab{flex:0 0 auto;font-size:13px;padding:8px 9px;border-radius:11px;background:#e2e8f0;color:#0f172a;box-shadow:none}.drawer-tab.active{background:#2563eb;color:#fff}.drawer-body{overflow:auto;padding:14px 14px 24px;flex:1}.panel{display:none}.panel.active{display:block}.panel h3{font-size:20px;margin:6px 0 10px}.panel p{font-size:14px;line-height:1.45;margin:7px 0;color:#334155}.progress-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:10px 0 13px}.stat-card{background:#f8fafc;border:1px solid #e2e8f0;border-radius:14px;padding:10px}.stat-card b{display:block;font-size:20px;color:#0f172a}.stat-card span{font-size:12px;color:#64748b;font-weight:800}.progress-table{width:100%;border-collapse:collapse;font-size:12px;background:#fff;border-radius:12px;overflow:hidden}.progress-table th,.progress-table td{border:1px solid #e2e8f0;padding:6px;text-align:center}.progress-table th{background:#eff6ff;color:#0f172a}.progress-table td:first-child,.progress-table th:first-child{text-align:left;font-weight:900}.qr-box{display:flex;flex-direction:column;align-items:center;gap:10px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:16px;padding:16px}.qr-box img{width:180px;height:180px;background:#fff;border:8px solid #fff;border-radius:10px;box-shadow:0 8px 24px rgba(15,23,42,.12)}.url-box{width:100%;word-break:break-all;background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:9px;font-size:12px;color:#334155}.help-card{border:1px solid #e2e8f0;border-radius:16px;padding:12px;margin:9px 0;background:#f8fafc}.help-card.locked{opacity:.55}.help-card h4{margin:0 0 7px;font-size:18px}.help-card .examples{background:#fff;border-left:5px solid #2563eb;border-radius:10px;padding:9px;margin-top:9px;font-size:14px;line-height:1.45}.badge{display:inline-block;background:#dcfce7;color:#166534;border-radius:999px;padding:3px 8px;font-size:11px;font-weight:900;margin-left:6px}.locked .badge{background:#e2e8f0;color:#475569}.badgebox{display:grid;grid-template-columns:repeat(auto-fit,minmax(125px,1fr));gap:8px}.award{border:1px solid #e2e8f0;border-radius:14px;padding:10px;background:#fff;text-align:center;font-weight:900}.award.locked{opacity:.42}.rank-row{display:grid;grid-template-columns:1fr 2fr auto;gap:8px;align-items:center;margin:8px 0}.bar{height:16px;background:#e2e8f0;border-radius:999px;overflow:hidden}.bar span{display:block;height:100%;background:linear-gradient(90deg,#22c55e,#2563eb)}.hint-note{background:#fffbeb;border:1px solid #fde68a;color:#78350f;border-radius:12px;padding:9px;font-size:13px;margin-top:11px}
@media(max-height:620px){.top-logo{height:38px;width:100px}.stage{grid-template-rows:auto 78px auto minmax(0,1fr) auto}.track-line,.track-fill{top:34px}.milestone{top:18px;font-size:9px}.milestone .dot{width:17px;height:17px;border-width:3px}.stickman{top:9px;width:28px;height:43px}.journey-info{font-size:11px}.prompt{font-size:clamp(16px,2.6vw,27px)}.word,.chip{font-size:clamp(16px,2.3vw,29px);padding:6px 9px}.bottom{min-height:50px}.why-card{bottom:60px}}
@media(max-width:720px){.small-progress{display:none}.top-logo{width:90px}.taskline{padding:6px 10px}.workarea{margin:0 8px 6px;padding:8px}.sort-layout{grid-template-columns:1fr;gap:8px}.sort-source{max-height:95px}.mc-grid{grid-template-columns:1fr}.bottom{align-items:flex-start}.feedback{font-size:13px}.actions button{font-size:14px;padding:10px 12px}.login-row{flex-direction:column}.journey-info{display:none}.badges-mini{font-size:14px}.drawer{width:95vw}}
</style>

function startKlassenMonitor(studentName){if(window.__KM_STARTED__)return;window.__KM_STARTED__=true;window.KM_STUDENT_NAME=studentName;const STORAGE_CLIENT_ID='km_client_id';let leaveTimer=null;function authHeaders(extra={}){const h={apikey:SUPABASE_KEY,Accept:'application/json',...extra};if(String(SUPABASE_KEY).startsWith('eyJ'))h.Authorization=`Bearer ${SUPABASE_KEY}`;return h}function slugify(t){return String(t).toLowerCase().replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue').replace(/ß/g,'ss').replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'')}function createId(){return(crypto&&crypto.randomUUID)?crypto.randomUUID():'id_'+Math.random().toString(36).slice(2)+'_'+Date.now()}let CLIENT_ID=localStorage.getItem(STORAGE_CLIENT_ID);if(!CLIENT_ID){CLIENT_ID=createId();localStorage.setItem(STORAGE_CLIENT_ID,CLIENT_ID)}const SESSION_ID='sess_'+slugify(APP_NAME)+'_'+CLIENT_ID;async function sendPing(action='ping'){if(leaveTimer){clearTimeout(leaveTimer);leaveTimer=null}const url=`${SUPABASE_URL}/rest/v1/active_sessions?on_conflict=session_id`;const body={session_id:SESSION_ID,client_id:CLIENT_ID,app_name:APP_NAME,student_name:studentName||null,last_seen:new Date().toISOString(),action};try{const res=await fetch(url,{method:'POST',headers:authHeaders({'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=minimal'}),body:JSON.stringify(body)});if(!res.ok)console.error('[KlassenMonitor]',res.status,await res.text().catch(()=>'') )}catch(e){console.error('[KlassenMonitor] Ping-Fehler:',e)}}async function sendLeave(){const url=`${SUPABASE_URL}/rest/v1/active_sessions?session_id=eq.${encodeURIComponent(SESSION_ID)}`;try{await fetch(url,{method:'PATCH',headers:authHeaders({'Content-Type':'application/json','Prefer':'return=minimal'}),body:JSON.stringify({last_seen:'2000-01-01T00:00:00Z',action:'leave'}),keepalive:true})}catch(e){}}window.KM_TRACK_EVENT=(action)=>sendPing(String(action).slice(0,240));window.KM_FETCH_CLASS=async()=>{const url=`${SUPABASE_URL}/rest/v1/active_sessions?app_name=eq.${encodeURIComponent(APP_NAME)}&select=student_name,action,last_seen,client_id&order=last_seen.desc&limit=60`;const res=await fetch(url,{headers:authHeaders()});if(!res.ok)throw new Error(await res.text());return res.json()};sendPing('start');const intervalId=setInterval(()=>{if(!document.hidden)sendPing(statusAction('ping'))},PING_INTERVAL_MS);window.addEventListener('beforeunload',()=>{if(leaveTimer)clearTimeout(leaveTimer);sendLeave();clearInterval(intervalId)});document.addEventListener('visibilitychange',()=>{if(document.hidden){if(leaveTimer)clearTimeout(leaveTimer);leaveTimer=setTimeout(()=>{leaveTimer=null;sendLeave()},LEAVE_DELAY_MS)}else{if(leaveTimer){clearTimeout(leaveTimer);leaveTimer=null}sendPing(statusAction('ping'))}})}

let WORD_TYPES=[],WORD_HELP={};const DEFAULT_HELP={nomen:['Nomen','Nomen sind Namenwörter. Sie bezeichnen Menschen, Tiere, Pflanzen, Dinge oder Gefühle.','der Hund, die Schule, das Fahrrad','Nomen werden großgeschrieben.'],verb:['Verb','Verben sind Tunwörter. Sie sagen, was jemand tut oder was geschieht.','laufen, schreibt, regnet','Verben kann man verändern: ich laufe, du läufst.'],adjektiv:['Adjektiv','Adjektive sind Wiewörter. Sie beschreiben, wie etwas ist.','schnell, klein, freundlich','Frage: Wie ist etwas?'],artikel:['Artikel','Artikel sind Begleiter von Nomen.','der, die, das, ein, eine','Artikel stehen oft vor einem Nomen.'],pronomen:['Pronomen','Pronomen sind Fürwörter. Sie stehen für ein Nomen oder eine Person.','ich, du, er, sie, wir, mein','Pronomen können Nomen ersetzen.']};
const state={studentName:'',learningIndex:0,newCorrect:0,attempts:0,correctTasks:0,current:null,selected:new Set(),answered:false,stats:{},reviewWeight:{},newSinceReview:0,badges:{},expertMode:false,sortSelection:null,selectedType:null,selectedReason:null,gapAnswer:null,placed:{},whyAnswered:0};
function setupData(data){TASKDATA=data;WORD_TYPES=data.wordTypes;WORD_TYPES.forEach(t=>{const h=DEFAULT_HELP[t.key]||[t.label,'','',''];WORD_HELP[t.key]={title:h[0],definition:h[1],examples:Array.isArray(h[2])?h[2].join(', '):h[2],tip:h[3]};state.stats[t.key] ||= {attempts:0,correct:0,wrong:0,reviewAttempts:0,reviewCorrect:0,reviewWrong:0,whyCorrect:0,whyWrong:0,productionCorrect:0};state.reviewWeight[t.key] ||= 1;state.badges[t.key] ||= false});}

const label=k=>WORD_TYPES.find(t=>t.key===k)?.label||k;const rand=a=>a[Math.floor(Math.random()*a.length)];function parseTokens(item){const raw=(item.text||'').match(/[A-Za-zÄÖÜäöüß]+|[^A-Za-zÄÖÜäöüß\s]/g)||[];let i=0;return raw.map(tok=>/^[A-Za-zÄÖÜäöüß]+$/.test(tok)?{text:tok,type:item.types[i++]||'unknown'}:{text:tok,type:'punct'})}function countTargets(tokens,t){return tokens.filter(x=>x.type===t).length}function checkpointPercent(i){return 20+i*18.5}function currentPositionPercent(){if(state.learningIndex>=WORD_TYPES.length)return 94;const start=state.learningIndex===0?7:checkpointPercent(state.learningIndex-1);const end=checkpointPercent(state.learningIndex);const part=Math.min(1,state.newCorrect/required());return start+(end-start)*part}function required(){return TASKDATA?.settings?.requiredNewCorrect||5}function unlockedKeys(){return WORD_TYPES.slice(0,Math.min(WORD_TYPES.length,state.learningIndex+1)).map(t=>t.key)}function learnedKeys(){return WORD_TYPES.slice(0,state.learningIndex).map(t=>t.key)}function statusAction(prefix='status'){return `${prefix}|stage=${Math.min(state.learningIndex+1,WORD_TYPES.length)}|new=${state.newCorrect}/${required()}|tasks=${state.attempts}|ok=${state.correctTasks}|badges=${Object.entries(state.badges).filter(x=>x[1]).map(x=>x[0][0]).join('')||'-'}`}

function weightedChoice(items){const sum=items.reduce((a,b)=>a+b.weight,0);let r=Math.random()*sum;for(const it of items){r-=it.weight;if(r<=0)return it}return items[items.length-1]}function taskText(target,count){const l=label(target);return count===1?`Klicke das ${l} an.`:`Klicke alle ${count} ${l} an.`}function itemHasType(item,t){return parseTokens(item).some(x=>x.type===t)}function sentenceFor(t){const pool=TASKDATA.sentences.filter(s=>(state.expertMode||!s.expert)&&itemHasType(s,t));return rand(pool)}function gapFor(t){const pool=TASKDATA.gapTasks.filter(g=>g.answerType===t);return pool.length?rand(pool):null}function sortFor(t,available){let pool=TASKDATA.sortTasks.filter(s=>s.boxes.includes(t)&&s.boxes.every(b=>available.includes(b)));if(!pool.length)pool=TASKDATA.sortTasks.filter(s=>s.boxes.includes(t));return pool.length?rand(pool):null}function mcFor(t){const pool=TASKDATA.mcReasonTasks.filter(m=>m.correctType===t);return pool.length?rand(pool):null}function productionFor(t){const pool=TASKDATA.productionPrompts.filter(p=>p.type===t);return pool.length?rand(pool):{type:t,prompt:`Schreibe ein eigenes Beispiel für ${label(t)}.`}}

async function updateClassPanel(){els.classPanel.innerHTML='<h3>Klassenspiegel</h3><p>Lade aktive Sitzungen …</p>';try{if(typeof window.KM_FETCH_CLASS!=='function')throw new Error('Klassenmonitor noch nicht gestartet.');const rows=await window.KM_FETCH_CLASS();const map=new Map();rows.forEach(r=>{if(!r.student_name)return;if(!map.has(r.student_name))map.set(r.student_name,r)});const data=[...map.values()].slice(0,20).map(r=>{const m=String(r.action||'').match(/stage=(\d+)/);const b=String(r.action||'').match(/badges=([^|]+)/);return{name:r.student_name,stage:m?Number(m[1]):1,badges:b?b[1]:'-',seen:r.last_seen}}).sort((a,b)=>b.stage-a.stage);if(!data.length){els.classPanel.innerHTML='<h3>Klassenspiegel</h3><p>Noch keine aktiven Mitschüler gefunden.</p>';return}els.classPanel.innerHTML='<h3>Klassenspiegel</h3><p>Aktive Sitzungen dieser App. Anzeige hängt von den Supabase-Rechten ab.</p>'+data.map(d=>`<div class="rank-row"><b>${escapeHtml(d.name)}</b><div class="bar"><span style="width:${Math.min(100,d.stage/WORD_TYPES.length*100)}%"></span></div><span>Stufe ${d.stage}</span></div>`).join('')}catch(e){els.classPanel.innerHTML=`<h3>Klassenspiegel</h3><p class="hint-note">Der Klassenspiegel konnte nicht geladen werden. Prüfe die Supabase-Leserechte/RLS für das Lehrerdashboard.</p><p>${escapeHtml(String(e.message||e))}</p>`}}
function openMenu(){els.drawer.classList.add('open');els.drawerBackdrop.classList.add('open');updateMenu();if(document.querySelector('[data-panel="classPanel"]').classList.contains('active'))updateClassPanel();track('menu|open')}function closeMenu(){els.drawer.classList.remove('open');els.drawerBackdrop.classList.remove('open')}
function startApp(){if(!TASKDATA){els.loadNote.innerHTML='<span class="error">Aufgabensätze noch nicht geladen.</span>';return}const name=els.name.value.trim();if(name.length<2){els.name.focus();els.name.placeholder='Bitte Namen eingeben';return}state.studentName=name;localStorage.setItem('km_student_name',name);loadLocalProgress();startKlassenMonitor(name);document.body.classList.remove('login-mode');document.body.classList.add('running');els.login.style.display='none';els.app.style.display='flex';updateJourney();chooseTask();track(statusAction('start'))}
function escapeHtml(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}function escapeReg(s){return String(s).replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
els.start.addEventListener('click',startApp);els.name.addEventListener('keydown',e=>{if(e.key==='Enter')startApp()});els.check.addEventListener('click',checkAnswer);els.next.addEventListener('click',chooseTask);els.menuBtn.addEventListener('click',openMenu);els.drawerClose.addEventListener('click',closeMenu);els.drawerBackdrop.addEventListener('click',closeMenu);document.querySelectorAll('.drawer-tab').forEach(tab=>{tab.addEventListener('click',()=>{document.querySelectorAll('.drawer-tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));tab.classList.add('active');document.getElementById(tab.dataset.panel).classList.add('active');updateMenu();if(tab.dataset.panel==='classPanel')updateClassPanel()})});const knownName=localStorage.getItem('km_student_name')||'';if(knownName)els.name.value=knownName;els.start.disabled=true;loadTasks();
</script>
</body>
